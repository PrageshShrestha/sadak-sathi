<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Location Sender</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 2rem;
    }
    #status {
      margin-top: 1rem;
      padding: 0.5rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      width: 300px;
    }
  </style>
</head>
<body>
  <h1>Location Sender</h1>
  <p>This page will ask for your location and send updates to the server continuously.</p>

  <div id="status">Initializing...</div>

  <script>
    function sendLocationToServer(lat, lon) {
      const data = {
        curr_lat: lat,
        curr_lon: lon
      };
      console.log('Sending location:', data);

      fetch('/send-location', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(data)
      })
      .then(response => response.json())
      .then(result => {
        document.getElementById('status').innerText = `Sent: ${lat}, ${lon} | Server: ${result.message}`;
      })
      .catch(error => {
        document.getElementById('status').innerText = 'Error: ' + error.message;
      });
    }

    function initLocationSending(navigator = window.navigator) {
        console.log(navigator);
      if (!navigator.geolocation) {
        document.getElementById('status').innerText = 'Geolocation is not supported by this browser.';
        return;
      }

      navigator.geolocation.watchPosition(
        (position) => {
          const lat = position.coords.latitude;
          const lon = position.coords.longitude;
          document.getElementById('status').innerText = `Got location: ${lat}, ${lon}`;
          sendLocationToServer(lat, lon);
        },
        (error) => {
          document.getElementById('status').innerText = 'Error getting location: ' + error.message;
        },
        { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
      );
    }

    initLocationSending();
  </script>
</body>
</html>
